<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cálculos de tubos de perfileria</title>
    
    <!-- Configuración para PWA (celulares) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/juandiegoruedajoc-dev/control-calidad-truper/main/logotipo%20de%20truper.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #0e1117; /* Color de fondo oscuro de Streamlit */
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>

<body>
    <!-- IMPORTANTE: Reemplaza este enlace por el enlace público de tu aplicación de Streamlit Cloud -->
